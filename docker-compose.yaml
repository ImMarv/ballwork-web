version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ballwork-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  maihog:
    image: mailhog/mailhog:latest
    container_name: ballwork-mailhog
    restart: always
    environment:
      - MH_HOSTNAME=habibimarv
    ports:
      - "1025:1025"
      - "8025:8025"


volumes:
  postgres_data:
