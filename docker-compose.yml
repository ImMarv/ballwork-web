version: "3.9"

# Base services: database + email (shared across environments)
services:
  db:
    image: postgres:16
    container_name: ballwork-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ballwork-db}
      POSTGRES_USER: ${POSTGRES_USER:-marv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xodus121}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ballwork-mailhog
    restart: always
    ports:
      - "1025:1025"      # SMTP
      - "8025:8025"      # Web UI

volumes:
  postgres_data:
