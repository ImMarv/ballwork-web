# Staging environment configuration
# Run with: docker-compose -f docker-compose.yml -f docker-compose.staging.yml up
#
# This replicates production-like behavior (no hot reload, no volumes)
# but runs locally for testing before pushing to GCP

version: "3.9"

services:
  mock-api-service:
    build:
      context: ./mock-api-service
      dockerfile: mock_api.dockerfile
    container_name: ballwork-mock-api-staging
    restart: always
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - ENV=staging
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./server
      dockerfile: ballwork.dockerfile
    container_name: ballwork-api-staging
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=staging
      - STATS_PROVIDER=mock_remote
      - MOCK_API_BASE_URL=http://mock-api-service:8081
    env_file:
      - .env.staging
    depends_on:
      db:
        condition: service_healthy
      mock-api-service:
        condition: service_started
